<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
    <link rel="manifest" href="img/site.webmanifest">
    <link rel="shortcut icon" href="img/favicon.ico">
    <meta name="theme-color" content="#0f172a">
    <title>Test Cases - Smart Home Planner</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/test-cases.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-brand">
                <a href="index.html" class="header-home-link">
                    <img src="img/logo.png" alt="Smart Home Planner logo" class="header-logo">
                    <h1 class="header-title">Smart Home Planner</h1>
                </a>
                <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="main-nav">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 6h18"></path>
                        <path d="M3 12h18"></path>
                        <path d="M3 18h18"></path>
                    </svg>
                </button>
            </div>
            <nav class="site-nav" id="main-nav">
                <a href="index.html">Dashboard</a>
                <a href="devices.html">Devices</a>
                <a href="test-cases.html" class="active">Test Cases</a>
                <a href="settings.html">Settings</a>
            </nav>
        </header>

        <section>
            <div class="section-header page-header">
                <div>
                    <h2>Test Cases</h2>
                    <p>Define manual checks and run them on schedule to validate critical automations.</p>
                </div>
                <a class="btn btn-primary" id="test-case-add-btn" href="test-case-add.html">Add Test Case</a>
            </div>

            <div class="test-cases-summary" id="test-cases-summary"></div>

            <div class="test-cases-toolbar">
                <div class="form-group toolbar-search">
                    <label for="test-case-search">Search</label>
                    <input class="form-input" type="search" id="test-case-search" placeholder="Search test names, steps, expected result, or notes">
                </div>
                <div class="form-group">
                    <label for="test-case-category-filter">Category</label>
                    <select class="form-input" id="test-case-category-filter"></select>
                </div>
                <div class="form-group">
                    <label for="test-case-priority-filter">Priority</label>
                    <select class="form-input" id="test-case-priority-filter">
                        <option value="all">All</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="test-case-health-filter">Health</label>
                    <select class="form-input" id="test-case-health-filter">
                        <option value="all">All</option>
                        <option value="failed">Failed</option>
                        <option value="overdue">Overdue</option>
                        <option value="due-soon">Due Soon (7d)</option>
                        <option value="healthy">Healthy</option>
                        <option value="disabled">Disabled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="test-case-sort-by">Sort By</label>
                    <select class="form-input" id="test-case-sort-by">
                        <option value="health">Health</option>
                        <option value="category">Category</option>
                        <option value="priority">Priority</option>
                        <option value="last-run-status">Last Run Status</option>
                        <option value="next-due">Next Due</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="test-case-sort-direction">Order</label>
                    <select class="form-input" id="test-case-sort-direction">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>
            </div>

            <div class="test-cases-list" id="test-cases-list"></div>
            <div class="empty-state" id="test-cases-empty" hidden>
                <h3>No test cases yet</h3>
                <p>Create your first manual test to start tracking operational checks.</p>
            </div>
        </section>
    </div>

    <div class="modal is-hidden" id="test-case-run-modal" aria-hidden="true">
        <div class="modal-overlay" id="test-case-run-modal-overlay"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="test-case-run-modal-title">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="test-case-run-modal-title">Run Test Case</div>
                    <div class="modal-subtitle" id="test-case-run-modal-subtitle"></div>
                </div>
                <button class="btn btn-secondary btn-sm btn-icon" type="button" id="test-case-run-modal-close" aria-label="Close">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 6l12 12"></path>
                        <path d="M18 6L6 18"></path>
                    </svg>
                </button>
            </div>
            <div class="test-case-run-form-grid">
                <div class="form-group">
                    <label for="test-case-run-status">Outcome</label>
                    <select class="form-input" id="test-case-run-status">
                        <option value="pass">Pass</option>
                        <option value="fail">Fail</option>
                        <option value="blocked">Blocked</option>
                    </select>
                </div>
                <div class="form-group run-date-group">
                    <label for="test-case-run-at">Run Date</label>
                    <input class="form-input" type="datetime-local" id="test-case-run-at">
                </div>
                <div class="form-group run-notes-group">
                    <label for="test-case-run-notes">Notes</label>
                    <textarea class="form-input" id="test-case-run-notes" rows="4" maxlength="1200" placeholder="Observed result, incident details, or follow-up actions"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" type="button" id="test-case-run-modal-cancel">Cancel</button>
                <button class="btn btn-primary" type="button" id="test-case-run-modal-save">Save Run</button>
            </div>
        </div>
    </div>

    <script src="js/metadata.js"></script>
    <script src="js/common.js"></script>
    <script src="js/test-cases.js"></script>
</body>
</html>
