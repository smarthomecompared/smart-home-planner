<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Planner • Historical Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-top: #222d3c;
            --bg-base: #1a2230;
            --bg-bottom: #141b26;
            --surface: #202a39;
            --surface-soft: #1c2634;
            --surface-strong: #263244;
            --surface-hover: #2a3649;
            --border: rgba(226, 232, 240, 0.08);
            --border-strong: rgba(226, 232, 240, 0.12);
            --text: #f7fafc;
            --text-muted: #c3cfde;
            --text-soft: #93a4ba;
            --shadow: 0 24px 48px rgba(7, 11, 19, 0.24);
            --emerald: #4ade80;
            --emerald-soft: rgba(74, 222, 128, 0.14);
            --sky: #60a5fa;
            --sky-soft: rgba(96, 165, 250, 0.14);
            --amber: #fbbf24;
            --amber-soft: rgba(251, 191, 36, 0.14);
            --rose: #fb7185;
            --rose-soft: rgba(251, 113, 133, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 0%, rgba(96, 165, 250, 0.12), transparent 18%),
                radial-gradient(circle at 100% 0%, rgba(74, 222, 128, 0.09), transparent 18%),
                linear-gradient(180deg, var(--bg-top) 0%, var(--bg-base) 34%, var(--bg-bottom) 100%);
        }

        .page-shell {
            width: calc(100vw - clamp(1rem, 2vw, 2.25rem));
            margin: 0 auto;
        }

        .surface {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
                var(--surface);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: var(--shadow);
        }

        .surface-soft {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .dashboard-header {
            padding: clamp(1.4rem, 2vw, 2.25rem);
            background:
                radial-gradient(circle at top right, rgba(96, 165, 250, 0.08), transparent 26%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
                var(--surface-strong);
        }

        .dashboard-stack {
            display: grid;
            gap: 1rem;
        }

        .header-grid {
            display: grid;
            gap: 1rem;
        }

        .header-copy-block,
        .section-heading {
            display: grid;
            align-content: start;
            gap: 0.5rem;
        }

        .header-copy-block {
            justify-items: center;
            text-align: center;
            margin-inline: auto;
        }

        .eyebrow {
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .page-title {
            margin: 0;
            font-size: clamp(1.9rem, 3.2vw, 3rem);
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .section-title {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .header-copy,
        .section-copy {
            color: var(--text-muted);
            line-height: 1.65;
        }

        .header-copy {
            max-width: 56rem;
            font-size: 16px;
        }

        .header-link {
            color: #93c5fd;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .header-link:hover {
            color: #bfdbfe;
            text-decoration: underline;
            text-underline-offset: 0.2em;
        }

        .meta-stack {
            display: grid;
            gap: 1rem;
            align-items: stretch;
        }

        .meta-card {
            padding: 1.1rem 1.2rem;
            min-height: 100%;
            display: grid;
            align-content: start;
            gap: 0.85rem;
        }

        .meta-value,
        .metric-value {
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: -0.04em;
        }

        .meta-value {
            font-size: 1.65rem;
            line-height: 1;
        }

        .meta-value-sub {
            font-family: "Manrope", sans-serif;
            font-size: 0.62em;
            font-weight: 700;
            letter-spacing: 0;
            color: var(--text-soft);
            margin-left: 0.28rem;
            vertical-align: middle;
        }

        .meta-inline {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: var(--text-muted);
        }

        .meta-card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .meta-card-copy {
            display: grid;
            gap: 0.35rem;
            align-content: start;
        }

        .metric-card {
            padding: 1.55rem;
            min-height: 208px;
            display: flex;
            flex-direction: column;
        }

        .metric-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .metric-label {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .metric-icon {
            width: 2.85rem;
            height: 2.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .metric-value {
            font-size: clamp(2.35rem, 4vw, 3.7rem);
            line-height: 0.98;
        }

        .metric-body {
            display: grid;
            gap: 0.8rem;
            align-content: start;
            margin-top: auto;
        }

        .metric-value-line {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.45rem;
        }

        .metric-note {
            margin: 0;
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.94rem;
            max-width: 28ch;
        }

        .metric-subvalue {
            font-family: "Manrope", sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0;
            line-height: 1.2;
            color: var(--text-soft);
            transform: translateY(-0.18rem);
        }

        .section-card {
            padding: 1.75rem;
        }

        .section-heading {
            margin-bottom: 1.4rem;
        }

        .section-heading-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.4rem;
        }

        .section-heading-row .section-heading {
            margin-bottom: 0;
        }

        .chart-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .range-control {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.28rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            flex: 0 0 auto;
        }

        .range-button {
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--text-soft);
            font: inherit;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.4rem 0.65rem;
            cursor: pointer;
            transition: background-color 140ms ease, color 140ms ease;
        }

        .range-button:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        .range-button.is-active {
            color: #0b1220;
            background: #dbe4f0;
        }

        .flag-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-soft);
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
        }

        .flag-toggle input {
            appearance: none;
            width: 2.2rem;
            height: 1.3rem;
            margin: 0;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            position: relative;
            transition: background-color 140ms ease, border-color 140ms ease;
        }

        .flag-toggle input::before {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 0.8rem;
            height: 0.8rem;
            border-radius: 999px;
            background: #dbe4f0;
            transition: transform 140ms ease, background-color 140ms ease;
        }

        .flag-toggle input:checked {
            background: rgba(74, 222, 128, 0.22);
            border-color: rgba(74, 222, 128, 0.5);
        }

        .flag-toggle input:checked::before {
            transform: translateX(0.88rem);
            background: #4ade80;
        }

        .chart-wrap {
            position: relative;
            height: 440px;
            margin-top: 1.5rem;
        }

        .chart-wrap-compact {
            height: 320px;
        }

        .pie-wrap {
            position: relative;
            width: min(280px, 100%);
            height: 280px;
            margin: 0;
        }

        .version-list {
            display: grid;
            gap: 0.75rem;
        }

        .kpi-grid {
            display: grid;
            gap: 1rem;
        }

        .details-grid {
            display: grid;
            gap: 1rem;
        }

        .ranking-grid {
            display: grid;
            gap: 1rem;
            align-items: stretch;
        }

        .github-grid {
            display: grid;
            gap: 1rem;
            align-items: stretch;
        }

        .ranking-grid > * {
            min-width: 0;
        }

        .github-grid > * {
            min-width: 0;
        }

        .versions-layout {
            display: grid;
            gap: 1.5rem;
            align-items: center;
        }

        .version-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
        }

        .version-item-left {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            min-width: 0;
        }

        .version-copy {
            display: grid;
            gap: 0.15rem;
            min-width: 0;
        }

        .version-dot {
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 999px;
            flex: 0 0 auto;
        }

        .version-name {
            margin: 0;
            font-weight: 700;
            color: var(--text);
        }

        .version-value {
            display: flex;
            align-items: baseline;
            gap: 0.45rem;
            justify-content: flex-end;
            white-space: nowrap;
        }

        .version-share {
            margin: 0.12rem 0 0;
            color: var(--text-soft);
            font-size: 0.9rem;
        }

        .version-share-inline {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.4rem;
        }

        .history-table th {
            padding: 0 0 0.95rem;
            color: var(--text-soft);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .history-table td {
            padding: 1rem 0;
            color: var(--text-muted);
            vertical-align: middle;
        }

        .history-table tbody tr {
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            transition: background-color 140ms ease;
        }

        .history-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.025);
        }

        .history-table td:first-child,
        .history-table th:first-child {
            padding-left: 0;
            width: 14rem;
            text-align: left;
        }

        .history-table td:last-child,
        .history-table th:last-child {
            padding-right: 0;
        }

        .table-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .table-summary {
            color: var(--text-soft);
            font-size: 0.92rem;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .pagination-button {
            min-width: 2.5rem;
            height: 2.5rem;
            padding: 0 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.035);
            color: var(--text);
            font: inherit;
            cursor: pointer;
            transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease;
        }

        .pagination-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .pagination-button:disabled {
            cursor: default;
            opacity: 0.45;
        }

        .pagination-status {
            color: var(--text-soft);
            font-size: 0.92rem;
            min-width: 4.5rem;
            text-align: center;
        }

        .state-card {
            min-height: 320px;
            display: grid;
            place-items: center;
            padding: 2rem;
            text-align: center;
        }

        .state-card p {
            margin: 0;
        }

        .accent-emerald {
            color: var(--emerald);
        }

        .accent-sky {
            color: var(--sky);
        }

        .accent-amber {
            color: var(--amber);
        }

        .accent-rose {
            color: var(--rose);
        }

        .accent-bg-emerald {
            background: var(--emerald-soft);
        }

        .accent-bg-sky {
            background: var(--sky-soft);
        }

        .accent-bg-amber {
            background: var(--amber-soft);
        }

        .accent-bg-rose {
            background: var(--rose-soft);
        }

        .accent-neutral {
            color: #dbe4f0;
        }

        .accent-bg-neutral {
            background: rgba(226, 232, 240, 0.08);
        }

        @media (min-width: 640px) {
            .kpi-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .meta-stack {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 960px) {
            .meta-stack {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .details-grid {
                grid-template-columns: minmax(0, 1.45fr) minmax(320px, 1fr);
            }

            .kpi-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .ranking-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }

            .github-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }
        }

        @media (min-width: 1180px) {
            .header-grid {
                grid-template-columns: minmax(0, 1.2fr) minmax(540px, 1fr);
                align-items: start;
            }

            .details-grid {
                grid-template-columns: minmax(0, 1.6fr) minmax(360px, 1fr);
            }

            .versions-layout {
                grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
            }
        }

        @media (min-width: 1500px) {
            .kpi-grid {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }
        }

        @media (min-width: 1400px) {
            .page-shell {
                width: calc(100vw - 2rem);
            }

            .chart-wrap {
                height: 500px;
            }
        }

        @media (max-width: 1024px) {
            .dashboard-header {
                padding: 1.6rem;
            }

            .section-card,
            .metric-card {
                padding: 1.25rem;
            }
        }

        @media (max-width: 768px) {
            body {
                background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-base) 42%, var(--bg-bottom) 100%);
            }

            .page-shell {
                width: calc(100vw - 1rem);
            }

            .meta-stack {
                grid-template-columns: 1fr;
            }

            .chart-wrap {
                height: 300px;
            }

            .pie-wrap {
                height: 220px;
                width: min(220px, 100%);
                margin: 0 auto;
            }

            .table-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .section-heading-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .chart-actions {
                width: 100%;
                justify-content: space-between;
            }

            .range-control {
                width: 100%;
                justify-content: space-between;
            }

            .range-button {
                flex: 1 1 0;
            }
        }

        @media (max-width: 560px) {
            .pagination-controls {
                width: 100%;
                justify-content: space-between;
            }

            .pagination-button {
                flex: 1 1 0;
            }

            .pagination-status {
                min-width: auto;
            }
        }
    </style>
</head>
<body class="px-2 py-3 sm:px-2.5 sm:py-4 lg:px-3 lg:py-5">
    <main class="page-shell">
        <div id="content" class="surface state-card">
            <div>
                <p class="eyebrow mb-3">Preparing dashboard</p>
                <p class="page-title mb-4">Smart Home Planner stats</p>
                <p class="header-copy mx-auto">Loading the latest analytics snapshot and historical trends.</p>
            </div>
        </div>
    </main>

    <script>
        const numberFormatter = new Intl.NumberFormat("en-US");
        const TABLE_PAGE_SIZE = 25;
        const dateFormatter = new Intl.DateTimeFormat("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric"
        });
        const versionPalette = ["#4ade80", "#60a5fa", "#fbbf24", "#fb7185", "#38bdf8", "#a78bfa"];
        const lineVersionPalette = ["#60a5fa", "#fbbf24", "#fb7185", "#38bdf8", "#a78bfa", "#34d399", "#f97316", "#f472b6"];
        const chartRangeOptions = [
            { key: "30d", label: "30D", days: 30 },
            { key: "90d", label: "90D", days: 90 },
            { key: "180d", label: "180D", days: 180 },
            { key: "1y", label: "1Y", days: 365 },
            { key: "all", label: "All", days: null }
        ];
        const defaultChartRange = "all";

        function formatNumber(value) {
            return numberFormatter.format(value || 0);
        }

        function formatOptionalNumber(value) {
            return Number.isFinite(value) ? numberFormatter.format(value) : "—";
        }

        function formatRank(value) {
            return Number.isInteger(value) ? `#${numberFormatter.format(value)}` : "—";
        }

        function getTopPercent(entry) {
            if (!Number.isInteger(entry?.install_rank) || !Number.isInteger(entry?.total_rank) || entry.total_rank <= 0) {
                return null;
            }

            return Math.max(0.1, (entry.install_rank / entry.total_rank) * 100);
        }

        function formatTopPercent(value) {
            return Number.isFinite(value) ? `Top ${value.toFixed(1)}%` : "—";
        }

        function formatPercent(value, total) {
            if (!total) {
                return "0%";
            }
            return `${Math.round((value / total) * 100)}%`;
        }

        function parseHistoryDate(value) {
            if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
                const [year, month, day] = value.split("-").map(Number);
                return new Date(year, month - 1, day);
            }

            return new Date(value);
        }

        function getThirtyDayBaselineEntry(history) {
            if (!Array.isArray(history) || history.length < 2) {
                return null;
            }

            const latestEntry = history[history.length - 1];
            const latestDate = parseHistoryDate(latestEntry.date);
            const baselineDate = new Date(latestDate);
            baselineDate.setDate(baselineDate.getDate() - 30);

            for (let index = history.length - 2; index >= 0; index -= 1) {
                const entryDate = parseHistoryDate(history[index].date);
                if (entryDate <= baselineDate) {
                    return history[index];
                }
            }

            return null;
        }

        function getDateKeySafe(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return null;
            }

            return date.toISOString().slice(0, 10);
        }

        function getGrowthSummary(history) {
            const baselineEntry = getThirtyDayBaselineEntry(history);
            if (!baselineEntry) {
                return {
                    label: "30-Day Growth",
                    helper: "Not enough history for a 30-day comparison yet",
                    value: null
                };
            }

            const latestEntry = history[history.length - 1];
            if (!baselineEntry.total) {
                return {
                    label: "30-Day Growth",
                    helper: "Not enough history for a 30-day comparison yet",
                    value: null
                };
            }

            const value = Math.round(((latestEntry.total - baselineEntry.total) / baselineEntry.total) * 100);
            return {
                label: "30-Day Growth",
                helper: `Change since ${dateFormatter.format(parseHistoryDate(baselineEntry.date))}`,
                value
            };
        }

        function getThirtyDayPercentChange(history, metricPicker) {
            const baselineEntry = getThirtyDayBaselineEntry(history);
            if (!baselineEntry) {
                return null;
            }

            const latestEntry = history[history.length - 1];
            const latestValue = metricPicker(latestEntry);
            const baselineValue = metricPicker(baselineEntry);
            if (!Number.isFinite(latestValue) || !Number.isFinite(baselineValue) || baselineValue === 0) {
                return null;
            }

            return Math.round(((latestValue - baselineValue) / baselineValue) * 100);
        }

        function getThirtyDayDelta(history, metricPicker) {
            const baselineEntry = getThirtyDayBaselineEntry(history);
            if (!baselineEntry) {
                return null;
            }

            const latestEntry = history[history.length - 1];
            const latestValue = metricPicker(latestEntry);
            const baselineValue = metricPicker(baselineEntry);
            if (!Number.isFinite(latestValue) || !Number.isFinite(baselineValue)) {
                return null;
            }

            return latestValue - baselineValue;
        }

        function formatMetricExtra(value, suffix) {
            if (!Number.isFinite(value)) {
                return "<span class=\"metric-subvalue\">(30D: —)</span>";
            }

            const sign = value >= 0 ? "+" : "";
            const unit = suffix || "";
            return `<span class="metric-subvalue">(30D: ${sign}${value}${unit})</span>`;
        }

        function getVersionEntries(latest) {
            return Object.entries(latest.versions || {})
                .sort(([, a], [, b]) => b - a)
                .map(([version, count], index) => ({
                    version,
                    count,
                    color: versionPalette[index % versionPalette.length],
                    share: formatPercent(count, latest.total)
                }));
        }

        function formatVersionLabel(version) {
            if (typeof version !== "string" || !version.trim()) {
                return "N/A";
            }

            return version.startsWith("v") ? version : `v${version}`;
        }

        function normalizeVersionToken(version) {
            if (typeof version !== "string") {
                return "";
            }

            return version.trim().replace(/^v/i, "").toLowerCase();
        }

        function getVersionShare(entry, version) {
            if (!entry || !version) {
                return null;
            }

            const targetVersion = normalizeVersionToken(version);
            if (!targetVersion) {
                return null;
            }

            const installs = Object.entries(entry.versions || {}).reduce((total, [versionKey, count]) => {
                if (normalizeVersionToken(versionKey) !== targetVersion || !Number.isFinite(count)) {
                    return total;
                }
                return total + count;
            }, 0);

            return formatPercent(installs, entry.total);
        }

        function normalizeReleaseEvents(releases) {
            const releaseMap = new Map();

            for (const release of Array.isArray(releases) ? releases : []) {
                const tag = typeof release?.tag === "string"
                    ? release.tag.trim()
                    : (typeof release?.tag_name === "string" ? release.tag_name.trim() : "");
                const date = getDateKeySafe(release?.date || release?.published_at || release?.created_at);

                if (!tag || !date) {
                    continue;
                }

                releaseMap.set(tag, { tag, date });
            }

            return Array.from(releaseMap.values()).sort((left, right) => {
                const dateDiff = left.date.localeCompare(right.date);
                if (dateDiff !== 0) {
                    return dateDiff;
                }
                return left.tag.localeCompare(right.tag);
            });
        }

        function getReleaseAnnotations(rangeHistory, releaseEvents) {
            if (!Array.isArray(rangeHistory) || rangeHistory.length === 0 || !Array.isArray(releaseEvents) || releaseEvents.length === 0) {
                return [];
            }

            const rangeStart = parseHistoryDate(rangeHistory[0].date);
            const rangeEnd = parseHistoryDate(rangeHistory[rangeHistory.length - 1].date);
            const annotationsByIndex = new Map();

            releaseEvents.forEach((release) => {
                const releaseDate = parseHistoryDate(release.date);
                if (releaseDate < rangeStart || releaseDate > rangeEnd) {
                    return;
                }

                const targetIndex = rangeHistory.findIndex((entry) => parseHistoryDate(entry.date) >= releaseDate);
                if (targetIndex < 0) {
                    return;
                }

                const labels = annotationsByIndex.get(targetIndex) || [];
                labels.push(formatVersionLabel(release.tag));
                annotationsByIndex.set(targetIndex, labels);
            });

            return Array.from(annotationsByIndex.entries())
                .sort(([leftIndex], [rightIndex]) => leftIndex - rightIndex)
                .map(([index, labels]) => ({
                    index,
                    label: Array.from(new Set(labels)).join(" · ")
                }));
        }

        const lineReleaseAnnotationPlugin = {
            id: "lineReleaseAnnotations",
            afterDatasetsDraw(chart, _, pluginOptions) {
                const annotations = Array.isArray(chart.$releaseAnnotations)
                    ? chart.$releaseAnnotations
                    : (Array.isArray(pluginOptions?.annotations) ? pluginOptions.annotations : []);
                if (annotations.length === 0) {
                    return;
                }

                const { ctx, chartArea, scales } = chart;
                const xScale = scales?.x;
                if (!ctx || !chartArea || !xScale) {
                    return;
                }

                ctx.save();
                annotations.forEach((annotation, index) => {
                    const x = xScale.getPixelForValue(annotation.index);
                    if (!Number.isFinite(x) || x < chartArea.left || x > chartArea.right) {
                        return;
                    }

                    ctx.strokeStyle = "rgba(251, 191, 36, 0.5)";
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(x, chartArea.top);
                    ctx.lineTo(x, chartArea.bottom);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.font = "600 11px Manrope, sans-serif";
                    ctx.textBaseline = "middle";

                    let label = annotation.label;
                    const maxLabelWidth = 120;
                    while (ctx.measureText(label).width > maxLabelWidth && label.length > 4) {
                        label = `${label.slice(0, -2)}…`;
                    }

                    const paddingX = 6;
                    const boxHeight = 18;
                    const textWidth = ctx.measureText(label).width;
                    const boxWidth = textWidth + (paddingX * 2);
                    let boxX = x - (boxWidth / 2);
                    if (boxX < chartArea.left) {
                        boxX = chartArea.left;
                    }
                    if (boxX + boxWidth > chartArea.right) {
                        boxX = chartArea.right - boxWidth;
                    }
                    const boxY = chartArea.top + 6 + ((index % 2) * (boxHeight + 4));

                    ctx.fillStyle = "rgba(251, 191, 36, 0.16)";
                    ctx.strokeStyle = "rgba(251, 191, 36, 0.42)";
                    ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                    ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);

                    ctx.fillStyle = "#fef3c7";
                    ctx.fillText(label, boxX + paddingX, boxY + (boxHeight / 2) + 0.5);
                });
                ctx.restore();
            }
        };

        function getHistoryForRange(history, rangeKey) {
            const rangeOption = chartRangeOptions.find((option) => option.key === rangeKey);
            if (!rangeOption || rangeOption.days === null) {
                return history;
            }

            const latestEntry = history[history.length - 1];
            const latestDate = parseHistoryDate(latestEntry.date);
            const cutoffDate = new Date(latestDate);
            cutoffDate.setDate(cutoffDate.getDate() - rangeOption.days);

            const filteredHistory = history.filter((entry) => parseHistoryDate(entry.date) >= cutoffDate);
            return filteredHistory.length > 0 ? filteredHistory : [latestEntry];
        }

        function buildTimeRangeControl(chartId) {
            return `
                <div class="range-control" data-range-control="${chartId}">
                    ${chartRangeOptions.map((option) => `
                        <button
                            class="range-button ${option.key === defaultChartRange ? "is-active" : ""}"
                            type="button"
                            data-range-value="${option.key}"
                        >${option.label}</button>
                    `).join("")}
                </div>
            `;
        }

        function buildVersionList(versionEntries) {
            if (versionEntries.length === 0) {
                return "<p class=\"text-sm text-slate-300\">No version data available for selected range.</p>";
            }

            return versionEntries.map((entry) => `
                <div class="version-item">
                    <div class="version-item-left">
                        <span class="version-dot" style="background:${entry.color}"></span>
                        <div class="version-copy">
                            <p class="version-name">${formatVersionLabel(entry.version)}</p>
                        </div>
                    </div>
                    <div class="version-value">
                        <p class="version-name">${formatNumber(entry.count)}</p>
                        <p class="version-share-inline">${entry.share}</p>
                    </div>
                </div>
            `).join("");
        }

        function getLineVersionColor(index) {
            if (index < lineVersionPalette.length) {
                return lineVersionPalette[index];
            }

            const hue = (index * 43 + 210) % 360;
            return `hsl(${hue} 72% 62%)`;
        }

        function buildMetricCard(label, accentClass, accentBgClass, value, helper, icon) {
            return `
                <article class="surface metric-card">
                    <div class="metric-card-header">
                        <p class="metric-label ${accentClass}">${label}</p>
                        <span class="metric-icon ${accentBgClass} ${accentClass}">

                    </div>
                    <div class="metric-body">
                        <div class="metric-value-line">
                            <div class="metric-value">${value}</div>
                        </div>
                        <p class="metric-note">${helper}</p>
                    </div>
                </article>
            `;
        }

        function renderHistoryTable(history, page) {
            const totalPages = Math.max(1, Math.ceil(history.length / TABLE_PAGE_SIZE));
            const currentPage = Math.min(Math.max(page, 1), totalPages);
            const reversedHistory = history.slice().reverse();
            const startIndex = (currentPage - 1) * TABLE_PAGE_SIZE;
            const pageEntries = reversedHistory.slice(startIndex, startIndex + TABLE_PAGE_SIZE);

            document.getElementById("tableBody").innerHTML = pageEntries.map((entry) => `
                <tr>
                    <td class="font-medium text-slate-100">${dateFormatter.format(parseHistoryDate(entry.date))}</td>
                    <td class="text-right font-semibold text-slate-100">${formatNumber(entry.total)}</td>
                    <td class="text-right">${formatPercent(entry.auto_update, entry.total)}</td>
                    <td class="text-right">${formatOptionalNumber(entry.stars)}</td>
                    <td class="text-right">${formatOptionalNumber(entry.forks)}</td>
                    <td class="text-right">${formatRank(entry.install_rank)}</td>
                    <td class="text-right">${formatTopPercent(getTopPercent(entry))}</td>
                </tr>
            `).join("");

            const rangeStart = history.length === 0 ? 0 : startIndex + 1;
            const rangeEnd = startIndex + pageEntries.length;
            document.getElementById("tableSummary").textContent = `Showing ${rangeStart}-${rangeEnd} of ${history.length}`;
            document.getElementById("paginationStatus").textContent = `${currentPage}/${totalPages}`;
            document.getElementById("paginationPrev").disabled = currentPage === 1;
            document.getElementById("paginationNext").disabled = currentPage === totalPages;

            return currentPage;
        }

        function renderDashboard(payload) {
            const resolvedHistory = Array.isArray(payload)
                ? payload
                : (Array.isArray(payload?.history) ? payload.history : []);
            const metaLatestRelease = typeof payload?.meta?.latest_release === "string" && payload.meta.latest_release.trim()
                ? payload.meta.latest_release.trim()
                : "";
            const releaseEvents = normalizeReleaseEvents(payload?.meta?.releases);

            const history = resolvedHistory;
            if (!Array.isArray(history) || history.length === 0) {

            const rankDelta = getThirtyDayDelta(history, (entry) => entry.install_rank);

            const latestRelease = metaLatestRelease || (typeof latest.latest_release === "string" && latest.latest_release.trim() ? latest.latest_release.trim() : "N/A");

                </section>

                <section class="kpi-grid">

                    )}
                    ${buildMetricCard(

                    ${buildMetricCard(

            const chartRanges = {
                line: defaultChartRange,
                pie: defaultChartRange,
                stars: defaultChartRange,
                forks: defaultChartRange,
                rank: defaultChartRange,
                topRank: defaultChartRange
            };
            const chartInstances = {
                line: null,
                pie: null,

            const lineVersionToggle = document.getElementById("lineVersionToggle");
            const lineReleaseToggle = document.getElementById("lineReleaseToggle");

            function getRangeLabels(rangeHistory) {
                return rangeHistory.map((entry) => dateFormatter.format(parseHistoryDate(entry.date)));

                return rangeHistory.length === 1 ? 4 : 0;

            function renderLineChart() {
                const rangeHistory = getHistoryForRange(history, chartRanges.line);
                const showVersionLines = Boolean(lineVersionToggle?.checked);
                const showReleaseAnnotations = Boolean(lineReleaseToggle?.checked);
                const releaseAnnotations = showReleaseAnnotations
                    ? getReleaseAnnotations(rangeHistory, releaseEvents)
                    : [];
                const pointRadius = getRangePointRadius(rangeHistory);
                const datasets = [{
                    label: "Total Installations",
                    data: rangeHistory.map((entry) => entry.total),
                    borderColor: "#4ade80",
                    backgroundColor: "rgba(74, 222, 128, 0.12)",
                    borderWidth: showVersionLines ? 2.5 : 3,
                    pointRadius,
                    pointHoverRadius: 5,
                    pointBackgroundColor: "#bbf7d0",
                    pointBorderWidth: 0,
                    tension: 0,
                    fill: !showVersionLines
                }];

                if (showVersionLines) {
                    const latestVersionMap = rangeHistory[rangeHistory.length - 1]?.versions || {};
                    const versionTotalsInRange = {};

                    rangeHistory.forEach((entry) => {
                        Object.entries(entry.versions || {}).forEach(([version, count]) => {
                            if (!Number.isFinite(count)) {
                                return;
                            }
                            versionTotalsInRange[version] = (versionTotalsInRange[version] || 0) + count;
                        });
                    });

                    const versionNames = Object.keys(versionTotalsInRange)
                        .filter((version) => versionTotalsInRange[version] > 0)
                        .sort((left, right) => {
                        const diff = (latestVersionMap[right] || 0) - (latestVersionMap[left] || 0);
                        if (diff !== 0) {
                            return diff;
                        }
                        return right.localeCompare(left, undefined, { numeric: true, sensitivity: "base" });
                    });

                    versionNames.forEach((version, index) => {
                        const color = getLineVersionColor(index);
                        datasets.push({
                            label: formatVersionLabel(version),
                            data: rangeHistory.map((entry) => {
                                const value = entry.versions?.[version];

                        plugins: {

                                annotations: releaseAnnotations

                            legend: {

                                    usePointStyle: true,
                                    pointStyle: "line"
                                }
                            },
                            tooltip: {
                                backgroundColor: "#111827",
                                borderColor: "rgba(226, 232, 240, 0.08)",
                                borderWidth: 1,
                                titleColor: "#f8fafc",
                                bodyColor: "#dbe4f0",
                                padding: 12,
                                displayColors: showVersionLines,
                                callbacks: {

                                        return `${context.dataset.label}: ${formatNumber(context.raw)}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: "rgba(255, 255, 255, 0.05)",
                                    drawBorder: false
                                },
                                ticks: {
                                    color: "#93a4ba",
                                    maxRotation: 0,
                                    autoSkipPadding: 18
                                }
                            },

                                    color: "rgba(255, 255, 255, 0.06)",

            function renderPieChart() {

                pie: renderPieChart,

                forks: renderForksChart,
                rank: renderRankChart,
                topRank: renderTopRankChart

            Object.values(chartRenderers).forEach((renderChart) => renderChart());

            if (lineVersionToggle) {
                lineVersionToggle.addEventListener("change", () => {
                    renderLineChart();
                });
            }

            if (lineReleaseToggle) {
                lineReleaseToggle.addEventListener("change", () => {
                    renderLineChart();
                });
            }

            document.querySelectorAll("[data-range-control]").forEach((control) => {
                control.addEventListener("click", (event) => {
                    const clickedButton = event.target.closest("[data-range-value]");
                    if (!clickedButton) {
                        return;
                    }

                    const chartId = control.dataset.rangeControl;
                    const selectedRange = clickedButton.dataset.rangeValue;
                    if (!chartRenderers[chartId] || chartRanges[chartId] === selectedRange) {
                        return;
                    }

                    chartRanges[chartId] = selectedRange;
                    control.querySelectorAll("[data-range-value]").forEach((button) => {
                        button.classList.toggle("is-active", button.dataset.rangeValue === selectedRange);
                    });

                    chartRenderers[chartId]();
                });
            });

            let currentTablePage = renderHistoryTable(history, 1);
            document.getElementById("paginationPrev").addEventListener("click", () => {
                currentTablePage = renderHistoryTable(history, currentTablePage - 1);
            });
            document.getElementById("paginationNext").addEventListener("click", () => {
                currentTablePage = renderHistoryTable(history, currentTablePage + 1);
            });
        }

        async function loadData() {
            const response = await fetch("./history.json", { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`History request failed: ${response.status}`);
            }
            const payload = await response.json();
            const rawHistory = Array.isArray(payload)
                ? payload
                : (Array.isArray(payload?.history) ? payload.history : []);
            const history = rawHistory
                .slice()
                .sort((left, right) => parseHistoryDate(left.date) - parseHistoryDate(right.date));

            const releaseFromMeta = typeof payload?.meta?.latest_release === "string" && payload.meta.latest_release.trim()
                ? payload.meta.latest_release.trim()
                : null;
            const releaseFromHistory = [...history]
                .reverse()
                .find((entry) => typeof entry?.latest_release === "string" && entry.latest_release.trim())?.latest_release?.trim() || null;
            const releasesFromMeta = normalizeReleaseEvents(payload?.meta?.releases);

            return {
                meta: {
                    latest_release: releaseFromMeta || releaseFromHistory,
                    releases: releasesFromMeta
                },
                history
            };
        }

        loadData()
            .then(renderDashboard)
            .catch((error) => {
                console.error("Failed to load data:", error);
                document.getElementById("content").innerHTML = `
                    <section class="surface state-card">
                        <div>
                            <p class="eyebrow mb-3">Load failed</p>
                            <p class="page-title mb-4">Unable to render stats</p>
                            <p class="header-copy mx-auto">
                                The dashboard could not load <code class="rounded bg-white/5 px-2 py-1 text-slate-100">history.json</code>.
                                Check that the file exists and contains valid JSON.
                            </p>
                        </div>
                    </section>
                `;
            });
