name: Update Stats

on:
    schedule:
        - cron: "0 0,12,18 * * *"
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: update-stats
    cancel-in-progress: false

jobs:
    update-stats:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                ref: gh-pages
                path: pages

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: pages/package-lock.json

            - name: Install dependencies
              working-directory: pages
              run: npm ci

            - name: Update stats history
              working-directory: pages
              run: node update-stats.js

            - name: Commit updated stats
              working-directory: pages
              run: |
                  if git diff --quiet -- docs/history.json; then
                    echo "No stats changes to commit."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add docs/history.json
                  git commit -m "Update stats history"
                  git push
