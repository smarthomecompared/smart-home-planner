name: Update History

on:
    schedule:
        - cron: "0 0,12,18 * * *"
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: update-history
    cancel-in-progress: false

jobs:
    update-history:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Update stats history
              run: node update-stats.js

            - name: Commit updated history
              run: |
                  if git diff --quiet -- docs/history.json; then
                    echo "No history changes to commit."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add docs/history.json
                  git commit -m "Update stats history"
                  git push
