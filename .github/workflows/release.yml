name: Release

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Extract release notes
              id: release
              shell: bash
              run: |
                  set -euo pipefail
                  changelog="smart-home-planner/CHANGELOG.md"
                  if [ ! -f "$changelog" ]; then
                      echo "Missing changelog at $changelog"
                      exit 1
                  fi
                  version_line=$(grep -m 1 "^## " "$changelog" || true)
                  if [ -z "$version_line" ]; then
                      echo "No version heading found in $changelog"
                      exit 1
                  fi
                  version=$(echo "$version_line" | sed -E 's/^## ([0-9]+(\.[0-9]+)*).*/\1/')
                  if [ -z "$version" ]; then
                      echo "Failed to parse version from: $version_line"
                      exit 1
                  fi
                  tag="v$version"
                  notes_path="release_notes.md"
                  awk 'BEGIN{found=0} /^## / {if(found==0){found=1; next} else {exit}} found {print}' "$changelog" > "$notes_path"
                  if [ ! -s "$notes_path" ]; then
                      echo "Release notes are empty for $version"
                      exit 1
                  fi
                  echo "tag=$tag" >> "$GITHUB_OUTPUT"
                  echo "version=$version" >> "$GITHUB_OUTPUT"
                  echo "notes_path=$notes_path" >> "$GITHUB_OUTPUT"
                  echo "tag=$tag"
                  echo "version=$version"

            - name: Fail if tag or release already exists
              uses: actions/github-script@v7
              with:
                  script: |
                      const tag = `${{ steps.release.outputs.tag }}`.trim();
                      if (!tag) {
                          core.setFailed('Missing release tag output.');
                          return;
                      }

                      const { owner, repo } = context.repo;
                      let tagExists = false;
                      let releaseExists = false;

                      try {
                          await github.rest.git.getRef({
                              owner,
                              repo,
                              ref: `tags/${tag}`
                          });
                          tagExists = true;
                      } catch (error) {
                          if (error.status !== 404) {
                              throw error;
                          }
                      }

                      try {
                          await github.rest.repos.getReleaseByTag({
                              owner,
                              repo,
                              tag
                          });
                          releaseExists = true;
                      } catch (error) {
                          if (error.status !== 404) {
                              throw error;
                          }
                      }

                      if (tagExists || releaseExists) {
                          core.setFailed(`Release aborted: tag "${tag}" already exists=${tagExists}, release already exists=${releaseExists}.`);
                          return;
                      }

                      core.info(`Tag "${tag}" and release do not exist. Continuing.`);

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release.outputs.tag }}
                  name: ${{ steps.release.outputs.tag }}
                  body_path: ${{ steps.release.outputs.notes_path }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
